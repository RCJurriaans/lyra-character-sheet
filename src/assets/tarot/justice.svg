<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="justiceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="justicePattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#d4af37" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="96" height="136" fill="url(#justiceGrad)" stroke="#d4af37" stroke-width="2" rx="4"/>
  <rect x="2" y="2" width="96" height="136" fill="url(#justicePattern)" stroke="none" rx="4"/>

  <text x="8" y="18" font-family="Cinzel, serif" font-size="16" font-weight="bold" fill="#d4af37">XI</text>

  <text x="50" y="35" font-family="Cinzel, serif" font-size="13" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="1">
    JUSTICE
  </text>

  <!-- Figure body -->
  <circle cx="50" cy="55" r="4" fill="#d4af37"/>
  <line x1="50" y1="59" x2="50" y2="75" stroke="#d4af37" stroke-width="2"/>
  <line x1="38" y1="65" x2="62" y2="65" stroke="#d4af37" stroke-width="2"/>

  <!-- Scales -->
  <g opacity="0.8">
    <!-- Left scale pan -->
    <line x1="30" y1="55" x2="50" y2="55" stroke="#d4af37" stroke-width="1.5"/>
    <path d="M 25 57 L 35 57 L 35 62 L 25 62 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>

    <!-- Right scale pan -->
    <line x1="50" y1="55" x2="70" y2="55" stroke="#d4af37" stroke-width="1.5"/>
    <path d="M 65 57 L 75 57 L 75 62 L 65 62 Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>

    <!-- Center pivot -->
    <circle cx="50" cy="55" r="1.5" fill="#d4af37"/>
  </g>

  <!-- Sword -->
  <line x1="55" y1="45" x2="60" y2="30" stroke="#d4af37" stroke-width="2"/>
  <polygon points="60,30 62,28 58,28" fill="#d4af37"/>

  <!-- Crown symbol -->
  <path d="M 40 40 Q 50 35 60 40" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>

  <text x="92" y="128" font-size="12" fill="#d4af37">♠</text>

  <text x="50" y="128" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.8">
    TRUTH • FAIRNESS • BALANCE
  </text>
</svg>
