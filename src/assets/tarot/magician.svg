<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="cardPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#d4af37" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card border -->
  <rect x="2" y="2" width="96" height="136" fill="url(#cardGrad)" stroke="#d4af37" stroke-width="2" rx="4"/>
  <rect x="2" y="2" width="96" height="136" fill="url(#cardPattern)" stroke="none" rx="4"/>

  <!-- Card number -->
  <text x="8" y="18" font-family="Cinzel, serif" font-size="16" font-weight="bold" fill="#d4af37">I</text>

  <!-- Card title -->
  <text x="50" y="35" font-family="Cinzel, serif" font-size="12" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="1">
    THE MAGICIAN
  </text>

  <!-- Central symbol - wand and infinity -->
  <circle cx="50" cy="60" r="20" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

  <!-- Wand -->
  <line x1="50" y1="40" x2="50" y2="70" stroke="#d4af37" stroke-width="2"/>
  <circle cx="50" cy="38" r="3" fill="#d4af37"/>

  <!-- Infinity symbol -->
  <path d="M 30 80 Q 40 75 50 80 Q 60 85 70 80" fill="none" stroke="#d4af37" stroke-width="2"/>

  <!-- Decorative flourishes -->
  <path d="M 15 50 Q 20 55 25 50" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <path d="M 75 50 Q 80 55 85 50" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>

  <!-- Suit symbol -->
  <text x="92" y="128" font-size="12" fill="#d4af37">♦</text>

  <!-- Keywords -->
  <text x="50" y="128" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.8">
    WILL • CREATION • POWER
  </text>
</svg>
