<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="towerPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#d4af37" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="96" height="136" fill="url(#towerGrad)" stroke="#d4af37" stroke-width="2" rx="4"/>
  <rect x="2" y="2" width="96" height="136" fill="url(#towerPattern)" stroke="none" rx="4"/>

  <text x="8" y="18" font-family="Cinzel, serif" font-size="16" font-weight="bold" fill="#d4af37">XVI</text>

  <text x="50" y="35" font-family="Cinzel, serif" font-size="13" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="1">
    THE TOWER
  </text>

  <!-- Tower structure -->
  <g stroke="#d4af37" stroke-width="2" fill="none">
    <!-- Base -->
    <path d="M 35 80 L 65 80 L 60 50 L 40 50 Z" fill="none" stroke="#d4af37" stroke-width="2"/>

    <!-- Tower blocks -->
    <line x1="35" y1="75" x2="65" y2="75" stroke-width="1.5"/>
    <line x1="35" y1="68" x2="65" y2="68" stroke-width="1.5"/>
    <line x1="35" y1="61" x2="65" y2="61" stroke-width="1.5"/>
    <line x1="35" y1="54" x2="65" y2="54" stroke-width="1.5"/>

    <!-- Window -->
    <circle cx="50" cy="60" r="3" fill="none"/>
  </g>

  <!-- Lightning/energy -->
  <path d="M 50 45 L 48 60 L 53 62 L 50 78" stroke="#ff6b35" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Sparks/energy particles -->
  <circle cx="42" cy="70" r="1.5" fill="#ff6b35" opacity="0.7"/>
  <circle cx="58" cy="65" r="1.5" fill="#ff6b35" opacity="0.7"/>
  <circle cx="48" cy="58" r="1" fill="#ff6b35" opacity="0.6"/>

  <!-- Crown falling -->
  <path d="M 45 40 Q 43 45 45 50" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.7"/>

  <text x="92" y="128" font-size="12" fill="#d4af37">⚔</text>

  <text x="50" y="128" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.8">
    CONFLICT • POWER • CHAOS
  </text>
</svg>
