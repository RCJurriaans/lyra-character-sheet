<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fortuneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="fortunePattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#d4af37" opacity="0.3"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="96" height="136" fill="url(#fortuneGrad)" stroke="#d4af37" stroke-width="2" rx="4"/>
  <rect x="2" y="2" width="96" height="136" fill="url(#fortunePattern)" stroke="none" rx="4"/>

  <text x="8" y="18" font-family="Cinzel, serif" font-size="16" font-weight="bold" fill="#d4af37">X</text>

  <text x="50" y="35" font-family="Cinzel, serif" font-size="11" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="1">
    WHEEL OF FORTUNE
  </text>

  <!-- Large wheel/circle -->
  <circle cx="50" cy="65" r="18" fill="none" stroke="#d4af37" stroke-width="2"/>

  <!-- Inner circle -->
  <circle cx="50" cy="65" r="12" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>

  <!-- Center circle -->
  <circle cx="50" cy="65" r="3" fill="#d4af37"/>

  <!-- Wheel spokes -->
  <line x1="50" y1="47" x2="50" y2="83" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="32" y1="65" x2="68" y2="65" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="37" y1="52" x2="63" y2="78" stroke="#d4af37" stroke-width="1"/>
  <line x1="63" y1="52" x2="37" y2="78" stroke="#d4af37" stroke-width="1"/>

  <!-- Coins around the wheel -->
  <circle cx="50" cy="45" r="2" fill="#d4af37"/>
  <circle cx="68" cy="65" r="2" fill="#d4af37"/>
  <circle cx="50" cy="85" r="2" fill="#d4af37"/>
  <circle cx="32" cy="65" r="2" fill="#d4af37"/>

  <!-- Decorative stars -->
  <text x="20" y="55" font-size="10" fill="#d4af37" opacity="0.7">✦</text>
  <text x="80" y="55" font-size="10" fill="#d4af37" opacity="0.7">✦</text>

  <text x="92" y="128" font-size="12" fill="#d4af37">♦</text>

  <text x="50" y="128" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.8">
    LUCK • DESTINY • CYCLES
  </text>
</svg>
